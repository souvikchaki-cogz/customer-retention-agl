version: "1.0.0"
confidence_floor: 0.55 # AOAI hit must be >= this confidence
evidence_guard:
  min_chars: 4 # ignore 1-3 char "evidence"
weights:
  property_sale_risk: 0.35
  contract_expiry_risk: 0.20
  bill_shock_risk: 0.20
  no_concession_risk: 0.15
text_rules:
  T1_FINAL_METER_READ:
    id: "T1"
    description: "Requesting a final meter read or final bill ahead of moving out."
    weight: 0.50
    phrase_hints:
      - "final meter read"
      - "final bill"
      - "last bill before I move"
      - "close my account"
      - "disconnection date"
    negations:
      - "interim meter read"

  T2_MOVE_OUT_REQUEST:
    id: "T2"
    description: "Customer explicitly stating they are moving out of the property."
    weight: 0.55
    phrase_hints:
      - "moving out"
      - "moving house"
      - "we're selling the property"
      - "selling the house"
      - "moving interstate"
      - "property is being rented out"
      - "settlement date"
      - "lease is ending"
    negations: []

  T3_ACCOUNT_TRANSFER_OR_CLOSURE:
    id: "T3"
    description: "Asking about transferring, closing, or disconnecting the energy account."
    weight: 0.45
    phrase_hints:
      - "transfer my account"
      - "close my account"
      - "disconnect my service"
      - "cancel my electricity"
      - "how do I cancel"
      - "notice period to close"
    negations:
      - "transfer to solar"

  T4_CREDIT_REFUND_REQUEST:
    id: "T4"
    description: "Asking about a credit balance refund, typically preceding account closure."
    weight: 0.35
    phrase_hints:
      - "refund my credit"
      - "get my credit back"
      - "outstanding credit balance"
      - "how do I get my refund"
    negations: []

  T5_LANDLORD_TENANT_CHANGE:
    id: "T5"
    description: "Mentioning a change in tenancy, landlord, or property ownership."
    weight: 0.40
    phrase_hints:
      - "new tenants moving in"
      - "property changing hands"
      - "landlord is selling"
      - "new owner"
      - "deceased estate"
      - "estate administration"
    negations: []

  T6_BILL_SHOCK_COMPLAINT:
    id: "T6"
    description: "Customer expressing shock or distress at a higher-than-expected bill."
    weight: 0.35
    phrase_hints:
      - "bill is too high"
      - "my bill doubled"
      - "shocked by my bill"
      - "this is way more than last quarter"
      - "can't afford this bill"
      - "bill increased significantly"
    negations:
      - "estimate"

  T7_COMPARING_RETAILERS:
    id: "T7"
    description: "Customer actively comparing AGL against other energy retailers."
    weight: 0.45
    phrase_hints:
      - "shopping around"
      - "comparing retailers"
      - "cheaper provider"
      - "better rates elsewhere"
      - "Energy Made Easy"
      - "found a cheaper plan"
      - "competitor is offering"
    negations:
      - "energy made easy account"

  T8_SWITCHING_PROCESS_ENQUIRY:
    id: "T8"
    description: "Asking about the process or timeframe for switching to another energy retailer."
    weight: 0.45
    phrase_hints:
      - "how do I switch"
      - "how long to transfer"
      - "switching retailer"
      - "cooling off period"
      - "exit fee"
      - "contract end date"
    negations: []

  T9_PLAN_OR_DISCOUNT_ENQUIRY:
    id: "T9"
    description: "Asking whether better plans, discounts, or tariffs are available."
    weight: 0.25
    phrase_hints:
      - "any better plans"
      - "what discounts are available"
      - "conditional discount expired"
      - "move to month to month"
      - "pay on time discount"
      - "solar feed-in tariff"
    negations: []

  T10_HARDSHIP_SWITCH_RISK:
    id: "T10"
    description: "Customer mentioning financial hardship or inability to pay, a precursor to switching."
    weight: 0.30
    phrase_hints:
      - "can't afford"
      - "hardship"
      - "payment plan"
      - "struggling to pay"
      - "cost of living"
      - "defer my payment"
    negations: []

decay:
  half_life_days: 21
exclusions:
  - "test account"
  - "dummy data"